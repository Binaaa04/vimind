
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vimind-backend
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_JWKS_JSON=${SUPABASE_JWKS_JSON}
      - FRONTEND_URL=${FRONTEND_URL}
      - PORT=8080
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-}
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
    container_name: vimind-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
