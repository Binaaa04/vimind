<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vimind — Deteksi Kesehatan Mental</title>
    <meta name="description" content="Vimind membantu kamu memahami kondisi kesehatan mental melalui tes psikologi sederhana dan daily mood check." />

    <!-- Google Translate Element -->
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          {
            pageLanguage: 'id',
            includedLanguages: 'en,id,ar,zh-CN,ja,ko,ms,fr,de,es',
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
            autoDisplay: false,
          },
          'google_translate_element'
        );
      }
    </script>
    <script type="text/javascript"
      src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit">
    </script>

    <style>
      /* 🚫 HIDE GOOGLE TRANSLATE TOP BAR - AGGRESSIVE */
      .goog-te-banner-frame { display: none !important; }
      .goog-te-banner { display: none !important; }
      .skiptranslate { font-family: inherit !important; }
      body { top: 0 !important; }
      #goog-gt-tt, .goog-te-balloon-frame { display: none !important; visibility: hidden !important; }
      iframe.goog-te-menu-frame {
        box-shadow: 0 10px 40px rgba(0,0,0,0.15) !important;
        border: 1px solid #e2e8f0 !important;
        border-radius: 12px !important;
      }
      
      /* ✨ TRANSLATE WIDGET CONTAINER - PREMIUM GLASSY */
     /* Dropdown Artikel */
.article-menu-wrapper {
    position: relative;
}

.nav-menu {
    background-color: transparent !important;
    border: none !important;
    color: #5B4A78 !important;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
    padding: 8px 12px;
    margin-top: 1px;
    box-shadow: none !important;
    display: flex;
    align-items: center;
    gap: 6px;
    border-radius: 20px;
    transition: all 0.3s ease;
}

.nav-menu:hover {
    background: rgba(139, 92, 246, 0.05) !important;
}

.dropdown-arrow {
    font-size: 0.8rem;
    transition: transform 0.3s ease;
}

.nav-menu.active .dropdown-arrow {
    transform: rotate(180deg);
}

.article-menu-dropdown {
    position: absolute;
    top: calc(100% + 12px);
    left: 0;
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(139, 92, 246, 0.15);
    border-radius: 20px;
    box-shadow: 0px 20px 48px rgba(139, 92, 246, 0.12);
    width: 320px;
    z-index: 1000;
    overflow: hidden;
    animation: dropdownSlide 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    padding: 8px;
}

@keyframes dropdownSlide {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
}

.article-menu-item {
    padding: 12px 18px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 600;
    color: #4B5563;
    transition: all 0.2s ease;
    margin-bottom: 2px;
}

.article-menu-item:last-child {
    margin-bottom: 0;
}

.article-menu-item:hover {
    background-color: rgba(139, 92, 246, 0.08);
    color: #8B5CF6;
    padding-left: 22px;
}
      #google_translate_widget_wrapper {
        position: fixed;
        bottom: 24px;
        right: 86px;
        z-index: 9999;
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-radius: 20px;
        border: 1px solid rgba(139, 92, 246, 0.2);
        box-shadow: 0 8px 32px rgba(139, 92, 246, 0.1);
        padding: 6px 16px;
        display: flex;
        align-items: center;
        gap: 10px;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        cursor: pointer;
      }

      #google_translate_widget_wrapper:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 40px rgba(139, 92, 246, 0.2);
        border-color: rgba(139, 92, 246, 0.6);
        background: rgba(255, 255, 255, 0.95);
      }

      #google_translate_widget_wrapper .translate-icon {
        font-size: 20px;
      }

      /* 🎨 NATIVE COMBO STYLING */
      .goog-te-gadget { 
        font-family: 'Poppins', sans-serif !important;
        font-size: 0 !important; 
      }
      
      .goog-te-gadget .goog-te-combo {
        margin: 0 !important;
        padding: 4px 6px !important;
        font-family: 'Poppins', sans-serif !important;
        font-size: 13px !important;
        font-weight: 600 !important;
        border: none !important;
        background: transparent !important;
        color: #4b5563 !important;
        cursor: pointer;
        outline: none !important;
      }

      .goog-logo-link, .goog-te-gadget span { display: none !important; }
    </style>
  </head>
  <body>
    <!-- Google Translate floating widget -->
    <div id="google_translate_widget_wrapper">
      <span class="translate-icon">🌐</span>
      <div id="google_translate_element"></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
