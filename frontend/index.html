    <script>
      // 🎌 DYNAMIC FLAG SWITCHER LOGIC (WIDGET + CHROME NATIVE)
      function updateFlag() {
        const combo = document.querySelector('.goog-te-combo');
        const flagImg = document.querySelector('#current-flag');
        if (!flagImg) return;

        const langMap = {
          'id': 'id',
          'en': 'us',
          'ar': 'sa',
          'zh-CN': 'cn',
          'ja': 'jp',
          'ko': 'kr',
          'ms': 'my',
          'fr': 'fr',
          'de': 'de',
          'es': 'es'
        };

        // 🎯 Priority 1: Check native Chrome translation attribute
        let currentLang = document.documentElement.lang || 'id';
        
        // 🎯 Priority 2: Check Google Widget Combo (if available)
        if (combo && combo.value) {
          currentLang = combo.value;
        }

        const countryCode = langMap[currentLang] || 'id';
        
        const flagUrl = currentLang === 'id' 
          ? '/flag-id.png' 
          : `https://flagcdn.com/w160/${countryCode}.png`;
          
        flagImg.src = flagUrl;

        // Update mobile pill label text
        const label = document.querySelector('#translate-label');
        if (label) {
          const displayCode = currentLang.toUpperCase().split('-')[0]; // 'ID', 'EN', 'ZH', etc.
          label.textContent = '🌐 ' + displayCode;
        }
      }

      // Watch for BOTH Widget Changes and HTML Lang Attribute Changes
      const observer = new MutationObserver((mutations) => {
        mutations.forEach((mutation) => {
          if (mutation.type === 'attributes' && mutation.attributeName === 'lang') {
            updateFlag();
          }
          if (document.querySelector('.goog-te-combo')) {
            const combo = document.querySelector('.goog-te-combo');
            combo.removeEventListener('change', updateFlag);
            combo.addEventListener('change', updateFlag);
            updateFlag();
          }
        });
      });

      // Target the HTML element specifically for 'lang' changes
      observer.observe(document.documentElement, { attributes: true });
      // Also watch body for async widget injection
      observer.observe(document.body, { childList: true, subtree: true });

      // Initial run
      window.addEventListener('load', updateFlag);
    </script>

    <script>
      // 🔒 AGGRESSIVELY SUPPRESS GOOGLE TRANSLATE BANNER
      // GT sets body.style.top via JS *after* load, so we need setInterval + MutationObserver
      function suppressTranslateBanner() {
        // 1. Force body top to 0 via inline style (overrides GT's inline style injection)
        if (document.body) {
          document.body.style.setProperty('top', '0px', 'important');
          document.body.style.setProperty('position', 'static', 'important');
        }

        // 2. Nuke the banner iframe
        document.querySelectorAll('.goog-te-banner-frame, .goog-te-balloon-frame').forEach(function(el) {
          el.style.setProperty('display', 'none', 'important');
          el.style.setProperty('visibility', 'hidden', 'important');
          el.style.setProperty('height', '0', 'important');
        });

        // 3. Nuke any iframe inside .skiptranslate
        var skip = document.querySelector('.skiptranslate');
        if (skip) {
          skip.querySelectorAll('iframe').forEach(function(el) {
            el.style.setProperty('display', 'none', 'important');
          });
        }

        // 4. Remove height from html element GT might add
        if (document.documentElement) {
          document.documentElement.style.setProperty('margin-top', '0', 'important');
        }
      }

      // Poll every 200ms - most reliable method for fighting GT's late JS injection
      var gtInterval = setInterval(suppressTranslateBanner, 200);

      // Also stop heavy polling after 10s, leave light interval running
      setTimeout(function() {
        clearInterval(gtInterval);
        gtInterval = setInterval(suppressTranslateBanner, 2000);
      }, 10000);

      // MutationObserver as extra layer
      var bannerObserver = new MutationObserver(suppressTranslateBanner);
      document.addEventListener('DOMContentLoaded', function() {
        suppressTranslateBanner();
        bannerObserver.observe(document.body, {
          childList: true,
          subtree: true,
          attributes: true,
          attributeFilter: ['style', 'class']
        });
        bannerObserver.observe(document.documentElement, {
          attributes: true,
          attributeFilter: ['style', 'class']
        });
      });
    </script>
